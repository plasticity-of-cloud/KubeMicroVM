# Webhook Server Configuration
quarkus.http.port=8443
quarkus.http.ssl-port=8443
quarkus.http.insecure-requests=disabled

# TLS Configuration - minimum TLS 1.2
quarkus.http.ssl.certificate.files=/etc/webhook/tls/tls.crt
quarkus.http.ssl.certificate.key-files=/etc/webhook/tls/tls.key
quarkus.http.ssl.protocols=TLSv1.2,TLSv1.3

# Health
quarkus.smallrye-health.root-path=/q/health

# Logging
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.level=${QUARKUS_LOG_LEVEL:INFO}

# JSON Configuration
quarkus.jackson.fail-on-unknown-properties=false
