name: Native Image Build (ARM64)

on:
  push:
    branches: [ main, 'spec/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '25'
  GRAALVM_DISTRIBUTION: 'mandrel'
  MAVEN_OPTS: '-Xmx4g'

jobs:
  # First run tests on JVM to ensure correctness
  test-jvm:
    name: Test (JVM mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Run tests
        run: ./mvnw verify -pl operator-core,operator-controller,operator-webhook,operator-cli -am --batch-mode --no-transfer-progress

  # Build native images on ARM64
  native-build-arm64:
    name: Native Build (ARM64)
    runs-on: ubuntu-24.04-arm
    needs: test-jvm
    strategy:
      matrix:
        module:
          - name: operator-controller
            artifact: lambda-vm-operator
            dockerfile: Dockerfile
          - name: operator-cli
            artifact: kubectl-microvm
            dockerfile: Dockerfile.cli
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM ${{ env.JAVA_VERSION }} (Mandrel)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.GRAALVM_DISTRIBUTION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'

      - name: Verify GraalVM installation
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java --version
          native-image --version

      - name: Build native image - ${{ matrix.module.name }}
        run: |
          ./mvnw package -pl ${{ matrix.module.name }} -am \
            -Dnative \
            -DskipTests \
            --batch-mode \
            --no-transfer-progress \
            -Dquarkus.native.container-build=false

      - name: Verify native binary exists
        run: |
          BINARY=$(find ${{ matrix.module.name }}/target -name "*-runner" -type f | head -1)
          if [ -z "$BINARY" ]; then
            echo "ERROR: Native binary not found!"
            exit 1
          fi
          echo "Native binary: $BINARY"
          ls -lh "$BINARY"
          file "$BINARY"

      - name: Test native binary startup
        run: |
          BINARY=$(find ${{ matrix.module.name }}/target -name "*-runner" -type f | head -1)
          if [ "${{ matrix.module.name }}" = "operator-cli" ]; then
            # CLI should respond to --help instantly
            timeout 5 "$BINARY" --help || true
          else
            # Operator should start and respond to health check
            "$BINARY" &
            PID=$!
            sleep 3
            # Check if process is still running
            if kill -0 $PID 2>/dev/null; then
              echo "Operator started successfully (PID: $PID)"
              # Try health endpoint
              curl -sf http://localhost:8080/q/health/live || echo "Health check not yet available (expected without K8s)"
              kill $PID
            else
              echo "WARNING: Operator exited (may need K8s context)"
            fi
          fi

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module.artifact }}-linux-arm64
          path: ${{ matrix.module.name }}/target/*-runner
          retention-days: 7

  # Build container images on ARM64
  container-build-arm64:
    name: Container Image (ARM64)
    runs-on: ubuntu-24.04-arm
    needs: native-build-arm64
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - module: operator-controller
            image: lambda-vm-operator
            dockerfile: Dockerfile
          - module: operator-cli
            image: kubectl-microvm
            dockerfile: Dockerfile.cli
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MAVEN_ARGS=-pl ${{ matrix.module }} -am -DskipTests --batch-mode --no-transfer-progress

  # Native test verification (runs native binary with test suite)
  native-test-arm64:
    name: Native Tests (ARM64)
    runs-on: ubuntu-24.04-arm
    needs: test-jvm
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM ${{ env.JAVA_VERSION }} (Mandrel)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.GRAALVM_DISTRIBUTION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'

      - name: Run native integration tests (operator-controller)
        run: |
          ./mvnw verify -pl operator-controller -am \
            -Dnative \
            --batch-mode \
            --no-transfer-progress \
            -Dquarkus.test.native-image-profile=test
        continue-on-error: true

      - name: Run native integration tests (operator-cli)
        run: |
          ./mvnw verify -pl operator-cli -am \
            -Dnative \
            --batch-mode \
            --no-transfer-progress \
            -Dquarkus.test.native-image-profile=test
        continue-on-error: true
