AWSTemplateFormatVersion: '2010-09-09'
Description: |
  KubeMicroVM Operator IAM Role — least-privilege access for managing
  AWS Lambda MicroVMs from an EKS cluster via Pod Identity or IRSA.

Parameters:
  ClusterName:
    Type: String
    Description: EKS cluster name where the operator runs

  Namespace:
    Type: String
    Default: kube-microvm
    Description: Kubernetes namespace for the operator ServiceAccount

  ServiceAccountName:
    Type: String
    Default: kube-microvm-operator
    Description: Kubernetes ServiceAccount name used by the operator

  BuildRoleArn:
    Type: String
    Default: ''
    Description: >-
      ARN of the IAM role used by the MicroVM image build service.
      Required for iam:PassRole when creating MicroVM images.

  OIDCProviderArn:
    Type: String
    Default: ''
    Description: >-
      (IRSA only) ARN of the EKS OIDC provider.
      Leave empty if using EKS Pod Identity.

  UsePodIdentity:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >-
      Use EKS Pod Identity trust policy (recommended).
      Set to false for IRSA trust policy.

Conditions:
  IsPodIdentity: !Equals [!Ref UsePodIdentity, 'true']
  IsIRSA: !Not [!Equals [!Ref UsePodIdentity, 'true']]
  HasBuildRole: !Not [!Equals [!Ref BuildRoleArn, '']]

Resources:
  OperatorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'kube-microvm-operator-${ClusterName}'
      Description: !Sub 'KubeMicroVM operator role for cluster ${ClusterName}'
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument: !If
        - IsPodIdentity
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: pods.eks.amazonaws.com
              Action:
                - sts:AssumeRole
                - sts:TagSession
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Federated: !Ref OIDCProviderArn
              Action: sts:AssumeRoleWithWebIdentity
              Condition:
                StringEquals:
                  aws:PrincipalTag/kubernetes-namespace: !Ref Namespace
                  aws:PrincipalTag/kubernetes-service-account: !Ref ServiceAccountName
      Tags:
        - Key: kubernetes.io/cluster
          Value: !Ref ClusterName
        - Key: kubernetes.io/service-account
          Value: !Ref ServiceAccountName

  MicroVMPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub 'KubeMicroVMOperatorPolicy-${ClusterName}'
      Description: Least-privilege policy for KubeMicroVM operator
      Roles:
        - !Ref OperatorRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # MicroVM lifecycle management
          - Sid: MicroVMOperations
            Effect: Allow
            Action:
              - lambda:RunMicrovm
              - lambda:GetMicrovm
              - lambda:ListMicrovms
              - lambda:SuspendMicrovm
              - lambda:ResumeMicrovm
              - lambda:TerminateMicrovm
              - lambda:CreateMicrovmAuthToken
              - lambda:CreateMicrovmShellAuthToken
            Resource: !Sub 'arn:aws:lambda:*:${AWS::AccountId}:microvm:*'

          # MicroVM image management
          - Sid: MicroVMImageOperations
            Effect: Allow
            Action:
              - lambda:CreateMicrovmImage
              - lambda:GetMicrovmImage
              - lambda:UpdateMicrovmImage
              - lambda:DeleteMicrovmImage
              - lambda:ListMicrovmImages
              - lambda:GetMicrovmImageVersion
              - lambda:ListMicrovmImageVersions
              - lambda:UpdateMicrovmImageVersion
              - lambda:DeleteMicrovmImageVersion
              - lambda:GetMicrovmImageBuild
              - lambda:ListMicrovmImageBuilds
              - lambda:ListManagedMicrovmImages
              - lambda:ListManagedMicrovmImageVersions
            Resource: '*'

          # Network connector management
          - Sid: NetworkConnectorOperations
            Effect: Allow
            Action:
              - lambda:CreateNetworkConnector
              - lambda:GetNetworkConnector
              - lambda:UpdateNetworkConnector
              - lambda:DeleteNetworkConnector
              - lambda:ListNetworkConnectors
              - lambda:PassNetworkConnector
            Resource: '*'

          # Tagging (scoped to account)
          - Sid: Tagging
            Effect: Allow
            Action:
              - lambda:TagResource
              - lambda:UntagResource
              - lambda:ListTags
            Resource: !Sub 'arn:aws:lambda:*:${AWS::AccountId}:*'

          # STS for caller identity verification (health check)
          - Sid: Identity
            Effect: Allow
            Action:
              - sts:GetCallerIdentity
            Resource: '*'

  # PassRole for the build service role (conditional)
  PassBuildRolePolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: HasBuildRole
    Properties:
      ManagedPolicyName: !Sub 'KubeMicroVMPassBuildRole-${ClusterName}'
      Description: Allows operator to pass the build role to MicroVM image service
      Roles:
        - !Ref OperatorRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PassBuildRole
            Effect: Allow
            Action: iam:PassRole
            Resource: !Ref BuildRoleArn

Outputs:
  RoleArn:
    Description: IAM Role ARN — use with EKS Pod Identity Association or IRSA annotation
    Value: !GetAtt OperatorRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleArn'

  PodIdentityCommand:
    Description: CLI command to create EKS Pod Identity Association
    Value: !Sub >-
      aws eks create-pod-identity-association
      --cluster-name ${ClusterName}
      --namespace ${Namespace}
      --service-account ${ServiceAccountName}
      --role-arn ${OperatorRole.Arn}

  IRSAAnnotation:
    Condition: IsIRSA
    Description: Annotation to add to the ServiceAccount for IRSA
    Value: !Sub 'eks.amazonaws.com/role-arn: ${OperatorRole.Arn}'
